name: CoinShop
version: 1.8
main: com.foxsrv.coinshop.CoinShop
api-version: 1.20
author: FoxOficial2
description: A Player Coin Shop plugin

commands:
  coinshop:
    description: Main CoinShop command
    aliases: [cshop]
    usage: /coinshop [reload|open|sell|cancel|card|name]

permissions:
  coinshop.*:
    description: All CoinShop permissions
    default: op
    children:
      coinshop.use: true
      coinshop.admin: true
  coinshop.use:
    description: Use basic CoinShop features
    default: true
  coinshop.admin:
    description: Admin commands like reload
    default: op
